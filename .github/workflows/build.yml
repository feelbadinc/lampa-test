name: Build and Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: pages
  cancel-in-progress: true

env:
  UPSTREAM_REPO: yumata/lampa-source

jobs:
  check:
    runs-on: ubuntu-latest

    outputs:
      skip: ${{ steps.check-upstream.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check upstream against deploy
        id: check-upstream
        env:
          DEPLOY_EPOCH: ${{ vars.DEPLOY_EPOCH }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/check.sh

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.skip != 'true'

    permissions:
      pages: write
      id-token: write
      actions: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    env:
      BUILD_INDEX: build/web/index.html

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone upstream repo
        run: |
          git clone --depth=1 \
            https://github.com/${{ env.UPSTREAM_REPO }} _source

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          package-manager-cache: false

      - name: Install node modules
        working-directory: _source
        run: |
          npm install \
            --omit=optional \
            --no-audit \
            --no-fund

      - name: Install inotify-tools
        run: |
          which inotifywait || \
            sudo apt-get install -qy --no-install-recommends inotify-tools

      - name: Build web app
        run: bash .github/scripts/build.sh

      - name: Inject custom settings
        run: bash .github/scripts/settings.sh

      - name: Upload app build as artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _source/build/web/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      #- name: Set DEPLOY_EPOCH var
        #env:
          #GH_TOKEN: ${{ secrets.PAT }}
        #run: gh variable set DEPLOY_EPOCH --body "$(date +%s)"
